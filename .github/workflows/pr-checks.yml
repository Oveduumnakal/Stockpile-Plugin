name: PR checks

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, milestoned, demilestoned]

jobs:
  conventions:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Milestone is set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MILESTONE=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --json milestone --jq '.milestone.title // ""')
          if [ -z "$MILESTONE" ]; then
            echo "::error::This PR has no milestone. Set the active release milestone (gh pr edit --milestone \"Release X.Y\")."
            exit 1
          fi
          echo "Milestone: $MILESTONE"

      - name: Branch follows naming convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if ! echo "$BRANCH" | grep -Eq '^[a-z]+/[a-z]+-[0-9]+-[a-z0-9-]+$'; then
            echo "::error::Branch '$BRANCH' does not match 'type/type-issue#-short-title' (e.g. bug/bug-36-ltst-staleness)."
            exit 1
          fi
          echo "Branch OK: $BRANCH"

      - name: Body references its issue
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! echo "$BODY" | grep -Eiq 'closes #[0-9]+'; then
            echo "::error::PR body must contain 'Closes #<issue>' so the merge closes its issue."
            exit 1
          fi
          echo "Issue reference found."
