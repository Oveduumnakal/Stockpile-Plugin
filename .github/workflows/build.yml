name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - uses: gradle/actions/wrapper-validation@v4

      - uses: gradle/actions/setup-gradle@v4

      - name: Build (compile, tests, style check, javadoc lint)
        run: ./gradlew build

      - name: Deprecation report
        run: |
          ./gradlew compileJava --rerun-tasks > compile.log 2>&1 || true
          {
            echo "### Deprecation warnings"
            if grep -qi 'deprecat' compile.log; then
              echo '```'
              grep -i 'deprecat' compile.log
              echo '```'
            else
              echo "None 🎉"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
