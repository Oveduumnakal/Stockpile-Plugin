<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a9dd3"/>
      <stop offset="0.55" stop-color="#486fae"/>
      <stop offset="1" stop-color="#2f4b7b"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6d873"/>
      <stop offset="1" stop-color="#b8861f"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f6000"/>
      <stop offset="0.5" stop-color="#ffe98a"/>
      <stop offset="1" stop-color="#8f6000"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#8fb0e0"/>
      <stop offset="1" stop-color="#4f74b1"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#717883"/>
      <stop offset="0.5" stop-color="#3c424b"/>
      <stop offset="1" stop-color="#1c2026"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa2ad"/>
      <stop offset="0.5" stop-color="#646c77"/>
      <stop offset="1" stop-color="#3a414a"/>
    </linearGradient>
    <!-- unifying light/dark sheen, same direction as the background gradient -->
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#tile)"/>
  <!-- gold border framed by thin black lines so it pops -->
  <rect x="6" y="6" width="116" height="116" rx="20" fill="none" stroke="url(#goldEdge)" stroke-width="5"/>
  <rect x="3.5" y="3.5" width="121" height="121" rx="22.5" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <rect x="8.5" y="8.5" width="111" height="111" rx="17.5" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- light grey horizontal grid lines (behind axes) -->
  <g stroke="#aab2bb" stroke-width="1.6" stroke-opacity="0.45" stroke-linecap="round">
    <line x1="23.5" y1="26" x2="100" y2="26"/>
    <line x1="23.5" y1="42" x2="100" y2="42"/>
    <line x1="23.5" y1="58" x2="100" y2="58"/>
    <line x1="23.5" y1="74" x2="100" y2="74"/>
    <line x1="23.5" y1="90" x2="100" y2="90"/>
  </g>

  <!-- faint chart axes -->
  <g stroke="#241d0e" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="23.5" y1="26" x2="23.5" y2="104.5"/>
    <line x1="23.5" y1="104.5" x2="100" y2="104.5"/>
  </g>

  <!-- three straight trend lines (30deg, shortened to stay within plot) -->
  <!-- green (above) -->
  <line x1="28.5" y1="65.1" x2="96.2" y2="26.0" stroke="#0a0a0a" stroke-width="7" stroke-linecap="round"/>
  <line x1="28.5" y1="65.1" x2="96.2" y2="26.0" stroke="#28c258" stroke-width="5" stroke-linecap="round"/>
  <!-- gold (middle) -->
  <line x1="28.5" y1="82.4" x2="96.2" y2="43.3" stroke="#0a0a0a" stroke-width="7" stroke-linecap="round"/>
  <line x1="28.5" y1="82.4" x2="96.2" y2="43.3" stroke="#f2c83c" stroke-width="5" stroke-linecap="round"/>
  <!-- red (below) -->
  <line x1="28.5" y1="99.7" x2="96.2" y2="60.6" stroke="#0a0a0a" stroke-width="7" stroke-linecap="round"/>
  <line x1="28.5" y1="99.7" x2="96.2" y2="60.6" stroke="#e3463f" stroke-width="5" stroke-linecap="round"/>
  <!-- magnifying glass (centered on the icon) -->
  <g transform="translate(-20,10)">
  <!-- handle (drawn first so the ring overlaps its top = clean joint) -->
  <line x1="97" y1="67" x2="114" y2="84" stroke="#0a0a0a" stroke-width="11" stroke-linecap="round"/>
  <line x1="97" y1="67" x2="114" y2="84" stroke="url(#handle)" stroke-width="7" stroke-linecap="round"/>

  <!-- magnifying glass (over the arrow) -->
  <circle cx="84" cy="54" r="20" fill="url(#lens)" stroke="#0a0a0a" stroke-width="2"/>
  <!-- magnified coin stack inside lens -->
  <g stroke="#0a0a0a" stroke-width="0.9" stroke-linejoin="round">
    <ellipse cx="84" cy="61" rx="13" ry="4" fill="url(#coin)"/>
    <path d="M71 61 v-6 a13 4 0 0 0 26 0 v6" fill="url(#coin)"/>
    <ellipse cx="84" cy="55" rx="13" ry="4" fill="url(#coin)"/>
    <path d="M71 55 v-6 a13 4 0 0 0 26 0 v6" fill="url(#coin)"/>
    <ellipse cx="84" cy="49" rx="13" ry="4" fill="url(#coin)"/>
  </g>
  <!-- steel rim, framed by thin black lines -->
  <circle cx="84" cy="54" r="20" fill="none" stroke="url(#steel)" stroke-width="5"/>
  <circle cx="84" cy="54" r="22.6" fill="none" stroke="#0a0a0a" stroke-width="1.4"/>
  <circle cx="84" cy="54" r="17.4" fill="none" stroke="#0a0a0a" stroke-width="1.2"/>
  <circle cx="84" cy="54" r="20" fill="none" stroke="#eef2f7" stroke-width="1.1" opacity="0.45"/>
  <!-- glint -->
  <path d="M74 46 a14 14 0 0 1 8 -6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- light/dark sheen across the foreground (inside the border) -->
  <rect x="9" y="9" width="110" height="110" rx="18" fill="url(#shade)"/>
</svg>
